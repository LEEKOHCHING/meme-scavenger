<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEME SCAVENGE AGENT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/app.css?v=3">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
</head>
<body>

<div class="bg-grid"></div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="hdr-left">
      <div class="hdr-text-btn" title="Help"><span>Help</span></div>
      <div class="hdr-text-btn" title="My Purchases" onclick="openHistory()"><span>History</span></div>
    </div>

    <div class="site-title">
      <span class="t1">MEME </span><span class="t2">SCAVENGE AGENT</span>
    </div>

    <div class="hdr-right">
      <div id="network-badge" class="network-badge" style="display:none"></div>
      <div class="hdr-text-btn" id="wallet-btn" onclick="connectWallet()"><span id="wallet-label">Connect Wallet</span></div>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <p class="section-label" id="section-label"><span>✦</span> They called it dead. I call it dormant. <span>✦</span></p>

    <div class="col-wrap">
    <div class="products">

      <!-- TIER 0: BASIC PACK -->
      <div class="card card-gray" onmouseenter="hoverCard(0,this)" onmouseleave="stopBurst()" onclick="buy(0)">
        <div class="badge">Basic Pack</div>
        <div class="item-art">
          <img src="/images/n1.png" alt="Basic Pack">
        </div>
        <div class="price">10U</div>
        <button class="btn" onclick="event.stopPropagation();buy(0)">BUY</button>
      </div>

      <!-- TIER 1: ELITE CHEST -->
      <div class="card card-blue" onmouseenter="hoverCard(1,this)" onmouseleave="stopBurst()" onclick="buy(1)">
        <div class="badge">Elite Chest</div>
        <div class="item-art">
          <img src="/images/n2.png" alt="Elite Chest">
        </div>
        <div class="price">20U</div>
        <button class="btn" onclick="event.stopPropagation();buy(1)">BUY</button>
      </div>

      <!-- TIER 2: MYTHIC CRATE -->
      <div class="card card-gold" onmouseenter="hoverCard(2,this)" onmouseleave="stopBurst()" onclick="buy(2)">
        <div class="badge">Mythic Crate</div>
        <div class="star-wrap">
          <i>✦</i><i>★</i><i>✧</i><i>◆</i><i>✦</i>
        </div>
        <div class="item-art">
          <img src="/images/n3.png" alt="Mythic Crate">
        </div>
        <div class="price">30U</div>
        <button class="btn" onclick="event.stopPropagation();buy(2)">BUY</button>
      </div>

    </div><!-- /products -->

    <!-- DIALOGUE BOX -->
    <div class="dialogue">
      <div class="dlg-top">
        <div class="dlg-avatar"><img src="/images/agent.png" alt="Sophia" style="width:100%;height:100%;object-fit:cover;"></div>
        <div class="dlg-name">Sophia</div>
      </div>
      <div class="dlg-body" id="dlg"></div>
      <div class="dlg-arrow">▼</div>
    </div>

    <!-- LIVE CHAT FEED -->
    <div class="live-feed">
      <div class="live-feed-header">
        <div class="live-dot"></div>
        <div class="live-feed-title">LIVE SHOW</div>
      </div>
      <div class="live-feed-body" id="live-feed-body"></div>
    </div>

    </div><!-- /col-wrap -->

  </main>
</div><!-- /wrap -->

<!-- HISTORY MODAL -->
<div id="history-modal" class="wallet-modal-overlay" style="display:none" onclick="closeHistoryModal(event)">
  <div class="history-box">
    <div class="history-title">PURCHASE HISTORY</div>
    <div class="history-subtitle" id="history-subtitle"></div>
    <div class="history-list" id="history-list"></div>
    <button class="wallet-modal-cancel" onclick="document.getElementById('history-modal').style.display='none'">CLOSE</button>
  </div>
</div>

<!-- CONFIRM PURCHASE MODAL -->
<div id="confirm-modal" class="wallet-modal-overlay" style="display:none" onclick="closeConfirmModal(event)">
  <div class="confirm-box">
    <div class="confirm-tier-badge" id="confirm-tier-badge"></div>
    <div class="confirm-img-wrap">
      <img id="confirm-img" src="" alt="">
    </div>
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-price-row">
      <span class="confirm-price-label">PRICE</span>
      <span class="confirm-price-val" id="confirm-price"></span>
    </div>
    <div class="confirm-desc" id="confirm-desc"></div>
    <div class="confirm-actions">
      <button class="confirm-btn-cancel" onclick="document.getElementById('confirm-modal').style.display='none'">CANCEL</button>
      <button class="confirm-btn-ok" id="confirm-btn-ok">CONFIRM BUY</button>
    </div>
  </div>
</div>

<!-- WALLET PICKER MODAL -->
<div id="wallet-modal" class="wallet-modal-overlay" style="display:none" onclick="closeWalletModal(event)">
  <div class="wallet-modal-box">
    <div class="wallet-modal-title">SELECT WALLET</div>
    <div class="wallet-modal-subtitle">Connect to BNB Smart Chain</div>
    <div class="wallet-list" id="wallet-list"></div>
    <button class="wallet-modal-cancel" onclick="document.getElementById('wallet-modal').style.display='none'">CANCEL</button>
  </div>
</div>

<script src="/static/js/contract.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
