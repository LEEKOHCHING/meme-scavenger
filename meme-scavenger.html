<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEME SCAVENGE AGENT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green:  #39FF14;
    --orange: #FFBD33;
    --blue:   #4DA6FF;
    --bg:     #0a0a12;
    --panel:  #10101c;
    --border: #1e1e30;
  }

  body {
    background: var(--bg);
    font-family: 'Press Start 2P', 'Noto Sans SC', monospace;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    image-rendering: pixelated;
  }


  /* scanlines overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* grid bg */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(57,255,20,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    position: relative;
    background: var(--panel);
    border-bottom: 3px solid var(--green);
    box-shadow: 0 0 24px rgba(57,255,20,.25);
  }

  .hdr-left { display: flex; align-items: center; gap: 10px; }

  .avatar-box {
    width: 46px; height: 46px;
    border: 3px solid var(--green);
    display: grid; place-items: center;
    font-size: 22px;
    background: #0d0d1a;
    box-shadow: 0 0 10px rgba(57,255,20,.4);
  }

  .coin-badge {
    background: #0d0d1a;
    border: 2px solid var(--orange);
    padding: 6px 12px;
    font-size: 9px;
    color: var(--orange);
    text-shadow: 0 0 8px var(--orange);
  }

  .site-title {
    font-size: clamp(18px, 3vw, 32px);
    letter-spacing: 2px;
    text-align: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    pointer-events: none;
  }
  .site-title .t1 { color: var(--green);  text-shadow: 0 0 12px var(--green),  0 0 24px var(--green); }
  .site-title .t2 { color: var(--orange); text-shadow: 0 0 12px var(--orange), 0 0 24px var(--orange); }

  .hdr-right { display: flex; gap: 10px; }
  .icon-btn {
    width: 38px; height: 38px;
    border: 2px solid #333;
    background: #0d0d1a;
    display: grid; place-items: center;
    font-size: 18px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .icon-btn:hover { border-color: var(--green); }
  .hdr-text-btn {
    width: auto;
    padding: 0 12px;
    font-size: 9px;
    font-family: 'Press Start 2P', monospace;
    gap: 6px;
    white-space: nowrap;
    cursor: pointer;
  }
  .lang-toggle {
    color: var(--green);
    border-color: var(--green);
    text-shadow: 0 0 6px var(--green);
  }

  /* ── MAIN ── */
  main { padding: 44px 20px 60px; max-width: 1020px; margin: 0 auto; }

  .section-label {
    text-align: center;
    font-size: 10px;
    color: #444;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }
  .section-label span { color: #39FF14; opacity: .6; }

  /* ── CARDS ── */
  .products {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .card {
    width: 230px;
    background: var(--panel);
    padding: 28px 18px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: transform .15s;
    border: 3px solid transparent;
    border-radius: 12px;
  }

  /* tier colours */
  .card-gray   { border-color: #555; }
  .card-blue   { border-color: #1a6bb5; }
  .card-gold   { border-color: #9b5cf6; box-shadow: 0 0 20px rgba(155,92,246,.25); }

  /* hover shake + glow */
  .card:hover { animation: shake .25s infinite; }
  .card-gray:hover  { border-color: #aaa; box-shadow: 0 0 20px rgba(180,180,180,.45); }
  .card-blue:hover  { border-color: var(--blue); box-shadow: 0 0 28px rgba(77,166,255,.55); }
  .card-gold:hover  { border-color: #c084fc; box-shadow: 0 0 40px rgba(192,132,252,.7), 0 0 80px rgba(155,92,246,.3); }

  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    20%      { transform: translate(-3px,-1px) rotate(-.8deg); }
    40%      { transform: translate(2px, 1px) rotate(.6deg); }
    60%      { transform: translate(-2px, 2px) rotate(-.5deg); }
    80%      { transform: translate(3px,-2px) rotate(.7deg); }
  }

  /* tier badge */
  .badge {
    position: absolute;
    top: -13px; left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 8px;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .card-gray .badge  { background: #2a2a2a; color: #aaa; border: 2px solid #666; }
  .card-blue .badge  { background: #071627; color: var(--blue); border: 2px solid #1a6bb5; }
  .card-gold .badge  { background: #1a0933; color: #c084fc; border: 2px solid #9b5cf6; text-shadow: 0 0 6px #c084fc; }

  /* item art */
  .item-art {
    width: 100px; height: 100px;
    margin: 10px auto 16px;
    display: grid; place-items: center;
    transition: transform .2s;
  }
  .card:hover .item-art { transform: translateY(-6px); }

  .item-art svg { image-rendering: pixelated; filter: drop-shadow(0 4px 10px rgba(0,0,0,.6)); }
  .card-gold:hover .item-art svg { filter: drop-shadow(0 0 10px rgba(255,189,51,.8)); }
  .card-blue:hover .item-art svg { filter: drop-shadow(0 0 8px rgba(77,166,255,.7)); }
  .item-art img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.7));
    image-rendering: pixelated;
  }
  .card-gray:hover .item-art img { filter: drop-shadow(0 0 12px rgba(180,180,180,.6)); }
  .card-blue:hover .item-art img { filter: drop-shadow(0 0 16px rgba(77,166,255,.8)); }
  .card-gold:hover .item-art img { filter: drop-shadow(0 0 16px rgba(155,92,246,.9)); }

  /* gold sparkle stars on card-gold */
  .star-wrap {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
    opacity: 0; transition: opacity .2s;
  }
  .card-gold:hover .star-wrap { opacity: 1; }
  .star-wrap i {
    position: absolute;
    font-style: normal;
    font-size: 11px;
    color: #c084fc;
    animation: star-pop 1.2s infinite;
  }
  .star-wrap i:nth-child(1)  { top:8%;  left:12%; animation-delay:0s; }
  .star-wrap i:nth-child(2)  { top:12%; right:14%; animation-delay:.3s; font-size:8px; }
  .star-wrap i:nth-child(3)  { top:4%;  left:55%; animation-delay:.6s; font-size:14px; }
  .star-wrap i:nth-child(4)  { top:22%; right:6%; animation-delay:.9s; font-size:9px; }
  .star-wrap i:nth-child(5)  { top:0%;  left:38%; animation-delay:.15s; font-size:7px; }
  @keyframes star-pop {
    0%,100% { transform: scale(.4) rotate(0deg);   opacity: 0; }
    50%      { transform: scale(1.3) rotate(180deg); opacity: 1; }
  }

  .card-name {
    font-size: 11px; letter-spacing: 2px; margin-bottom: 8px;
  }
  .card-gray .card-name  { color: #ccc; }
  .card-blue .card-name  { color: var(--blue); text-shadow: 0 0 8px var(--blue); }
  .card-gold .card-name  { color: var(--orange); text-shadow: 0 0 8px var(--orange); }

  .card-desc {
    font-size: 6px; color: #555; line-height: 2.2; margin-bottom: 16px;
  }

  .price {
    display: inline-block;
    font-size: 13px; padding: 7px 18px;
    border: 3px solid; margin-bottom: 14px;
    letter-spacing: 1px;
    border-radius: 8px;
  }
  .card-gray .price  { color: #bbb; border-color: #666; background: #18181e; }
  .card-blue .price  { color: var(--blue); border-color: #1a6bb5; background: #060f1e; }
  .card-gold .price  { color: #c084fc; border-color: #9b5cf6; background: #0e0020; text-shadow: 0 0 8px #c084fc; }

  .btn {
    display: block; width: 100%;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; padding: 14px 0;
    border: none; cursor: pointer;
    letter-spacing: 1px;
    border-radius: 8px;
    transition: transform .1s, box-shadow .1s;
  }
  .btn:active { transform: translateY(3px) !important; }

  .card-gray .btn  { background: #3a3a3a; color: #ddd; border: 3px solid #666; box-shadow: 0 4px 0 #1a1a1a; }
  .card-gray .btn:hover  { transform: translateY(2px); box-shadow: 0 2px 0 #1a1a1a; background: #4a4a4a; }

  .card-blue .btn  { background: #071627; color: var(--blue); border: 3px solid #1a6bb5; box-shadow: 0 4px 0 #020609; }
  .card-blue .btn:hover  { transform: translateY(2px); box-shadow: 0 2px 0 #020609; background: #0d2440; }

  .card-gold .btn  { background: #1a0933; color: #c084fc; border: 3px solid #9b5cf6; box-shadow: 0 4px 0 #0a0020, 0 0 12px rgba(155,92,246,.3); }
  .card-gold .btn:hover  { transform: translateY(2px); box-shadow: 0 2px 0 #0a0020, 0 0 24px rgba(155,92,246,.6); background: #2a1050; }

  /* ── DIALOGUE ── */
  .dialogue {
    max-width: none; margin: 0 auto;
    background: #090910;
    border: 4px solid var(--green);
    border-radius: 12px;
    box-shadow: 0 0 24px rgba(57,255,20,.3), inset 0 0 16px rgba(0,0,0,.6);
    padding: 18px 20px 22px;
    position: relative;
  }

  .dlg-top { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }

  .dlg-avatar {
    width: 52px; height: 52px; flex-shrink: 0;
    border: 3px solid var(--green);
    border-radius: 10px;
    background: #0d0d1a;
    display: grid; place-items: center;
    font-size: 26px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(57,255,20,.4);
  }

  .dlg-name {
    font-size: 16px; color: var(--green);
    text-shadow: 0 0 8px var(--green);
  }

  .dlg-body {
    font-size: 11px; color: #ccc;
    line-height: 2.2; min-height: 44px;
  }

  .cursor {
    display: inline-block; width: 8px; height: 14px;
    background: var(--green); vertical-align: middle; margin-left: 2px;
    animation: blink .65s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .dlg-arrow {
    position: absolute; bottom: 8px; right: 14px;
    color: var(--green); font-size: 10px;
    animation: arr-bounce .8s infinite;
  }
  @keyframes arr-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

  /* shared column wrapper — exactly 3×230px cards + 2×28px gaps */
  .col-wrap {
    display: flex;
    flex-direction: column;
    width: 746px;
    margin: 0 auto;
  }
  .col-wrap .products {
    width: 100%;
  }
  .col-wrap .dialogue,
  .col-wrap .live-feed {
    width: 100%;
    max-width: none;
    box-sizing: border-box;
  }

  /* live chat feed */
  .live-feed {
    max-width: none; margin: 20px auto 0;
    background: #090910;
    border: 3px solid #ff2244;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 16px rgba(255,34,68,.3);
  }

  .live-feed-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 2px solid #1e0a0e;
    background: #110008;
  }

  .live-dot {
    width: 10px; height: 10px;
    background: #ff2244;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff2244;
    animation: live-blink 1s infinite;
  }
  @keyframes live-blink {
    0%,100% { opacity: 1; } 50% { opacity: .3; }
  }

  .live-feed-title {
    font-size: 10px; color: #ff2244;
    text-shadow: 0 0 8px #ff2244;
    letter-spacing: 2px;
  }

  .live-feed-body {
    height: 160px;
    overflow: hidden;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 8px;
  }

  .chat-msg {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 11px; line-height: 1.6;
    animation: msg-in .4s ease-out;
    opacity: 0;
    animation-fill-mode: forwards;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chat-user {
    flex-shrink: 0;
    font-size: 9px;
    font-weight: bold;
  }

  .chat-text { color: #bbb; }

  /* floating particles */
  .fp {
    position: fixed; pointer-events: none; z-index: 500;
    font-size: 12px; animation: fp-anim 1s ease-out forwards;
  }
  @keyframes fp-anim {
    0%   { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity:0; transform: translate(var(--dx),var(--dy)) scale(0) rotate(360deg); }
  }

  /* neon side labels */
  .neon-label {
    position: fixed; top: 50%; transform: translateY(-50%);
    font-size: 7px; letter-spacing: 3px; writing-mode: vertical-rl;
    padding: 10px 6px;
    border: 2px solid;
    opacity: .35;
  }
  .neon-left  { left: 8px;  color: #ff6b00; border-color: #ff6b00; text-shadow: 0 0 8px #ff6b00; }
  .neon-right { right: 8px; color: #ff00ff; border-color: #ff00ff; text-shadow: 0 0 8px #ff00ff; }
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="hdr-spacer"></div>

    <div class="site-title">
      <span class="t1">MEME </span><span class="t2">SCAVENGE AGENT</span>
    </div>

    <div class="hdr-right">
      <div class="icon-btn hdr-text-btn" title="Help">❓ <span id="help-label">Help</span></div>
      <div class="icon-btn hdr-text-btn" title="Connect Wallet">🔗 <span id="wallet-label">Wallet</span></div>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <p class="section-label" id="section-label"><span>✦</span> Finding Treasures in the Ruins <span>✦</span></p>

    <div class="col-wrap">
    <div class="products">

      <!-- ── TIER 1: CLOTH BAG ── -->
      <div class="card card-gray" onmouseenter="burst(this,'gray')" onclick="reply(0)">
        <div class="badge" id="badge-0">Basic Pack</div>

        <div class="item-art">
          <img src="n1.png" alt="布袋">
        </div>

        <div class="price">10U</div>
        <button class="btn" onclick="event.stopPropagation();reply(0)">BUY</button>
      </div>

      <!-- ── TIER 2: WOODEN CRATE ── -->
      <div class="card card-blue" onmouseenter="burst(this,'blue')" onclick="reply(1)">
        <div class="badge" id="badge-1">Elite Chest</div>

        <div class="item-art">
          <img src="n2.png" alt="木箱">
        </div>

        <div class="price">20U</div>
        <button class="btn" onclick="event.stopPropagation();reply(1)">BUY</button>
      </div>

      <!-- ── TIER 3: IRON CHEST ── -->
      <div class="card card-gold" onmouseenter="burst(this,'gold')" onclick="reply(2)">
        <div class="badge" id="badge-2">Mythic Crate</div>

        <div class="star-wrap">
          <i>✦</i><i>★</i><i>✧</i><i>◆</i><i>✦</i>
        </div>

        <div class="item-art">
          <img src="n3.png" alt="铁箱">
        </div>

        <div class="price">30U</div>
        <button class="btn" onclick="event.stopPropagation();reply(2)">BUY</button>
      </div>

    </div><!-- /products -->

    <!-- DIALOGUE BOX -->
    <div class="dialogue">
      <div class="dlg-top">
        <div class="dlg-avatar"><img src="agent.png" alt="Sophia" style="width:100%;height:100%;object-fit:cover;"></div>
        <div class="dlg-name">Sophia</div>
      </div>
      <div class="dlg-body" id="dlg"></div>
      <div class="dlg-arrow">▼</div>
    </div>

    <!-- LIVE CHAT FEED -->
    <div class="live-feed">
      <div class="live-feed-header">
        <div class="live-dot"></div>
        <div class="live-feed-title">LIVE SHOW</div>
      </div>
      <div class="live-feed-body" id="live-feed-body"></div>
    </div>

    </div><!-- /col-wrap -->

  </main>
</div><!-- /wrap -->

<script>
// ── Dialogue lines ──
const LINES = [
  "Hey boss, I dug all this from the zeroed-out ruins. Some might pump after a wash, some are pure scrap. Feeling lucky?",
  "Basic bag? Bold choice... maybe! Who knows if it's a doge coin or a rusty bolt, heh.",
  "Elite Chest! Generous boss — I pulled this from deep in the cyber ruins. Worth every U!",
  "Mythic Crate?! You're going all in! Alright, may the gods of luck be with you, boss! 🔥",
];

// ── Live chat messages ──
const CHAT_MSGS = [
  { user: "Sophia", color: "#39FF14", text: "Scanning 847 tokens on-chain... found a hidden gem 💎" },
  { user: "Sophia", color: "#39FF14", text: "This token's volume just spiked 300% with zero news — digging deeper 🔍" },
  { user: "Sophia", color: "#39FF14", text: "3AM and I'm still here. Ruins don't sleep, neither do I 🌙" },
  { user: "Sophia", color: "#39FF14", text: "Whale wallet just accumulated quietly. Something's brewing 🐋" },
  { user: "Sophia", color: "#39FF14", text: "Cross-referencing social signals with on-chain data... 🤖" },
  { user: "Sophia", color: "#39FF14", text: "Low market cap, strong community, undervalued — adding to watchlist ⭐" },
  { user: "Sophia", color: "#39FF14", text: "Just found a token that pumped 40x last cycle. Watching it now 👀" },
  { user: "Sophia", color: "#39FF14", text: "Liquidity locked, dev wallet clean. This one smells different 🧪" },
  { user: "Sophia", color: "#39FF14", text: "Been digging for 6 hours straight. The ruins always hide something good 💪" },
  { user: "Sophia", color: "#39FF14", text: "New wallet pattern detected — smart money is moving in silently 📊" },
];

let currentLineIdx = 0;

// ── Dialogue ──
let typer = null;

function typeText(text) {
  const el = document.getElementById('dlg');
  if (typer) clearTimeout(typer);
  el.innerHTML = '';
  let i = 0;
  function tick() {
    if (i < text.length) {
      el.innerHTML = text.slice(0, ++i) + '<span class="cursor"></span>';
      typer = setTimeout(tick, 55);
    } else {
      el.innerHTML = text + '<span class="cursor"></span>';
    }
  }
  tick();
}

function reply(idx) {
  currentLineIdx = idx + 1;
  typeText(LINES[currentLineIdx]);
}

// ── Live chat feed ──
let chatIndex = 0;
const feedBody = document.getElementById('live-feed-body');

function addChatMsg() {
  const msg = CHAT_MSGS[chatIndex % CHAT_MSGS.length];
  chatIndex++;

  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = `<span class="chat-user" style="color:${msg.color}">${msg.user}:</span><span class="chat-text">${msg.text}</span>`;
  feedBody.appendChild(el);

  while (feedBody.children.length > 6) feedBody.removeChild(feedBody.firstChild);
  setTimeout(addChatMsg, 2200 + Math.random() * 1800);
}

// seed 3 initial messages
for (let i = 0; i < 3; i++) {
  const msg = CHAT_MSGS[i];
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.style.opacity = '1';
  el.innerHTML = `<span class="chat-user" style="color:${msg.color}">${msg.user}:</span><span class="chat-text">${msg.text}</span>`;
  feedBody.appendChild(el);
  chatIndex++;
}
setTimeout(addChatMsg, 2500);

// ── Burst particles ──
const PALETTES = {
  gray: ['#aaa','#ccc','#888','#ddd'],
  blue: ['#4da6ff','#7bbfff','#1a6bb5','#a0d4ff'],
  gold: ['#9b5cf6','#c084fc','#7c3aed','#e9d5ff','#a855f7'],
};
const SYMS = ['✦','★','✧','◆','·','✶'];

function burst(card, tier) {
  const pal = PALETTES[tier];
  const count = tier === 'gold' ? 10 : 5;
  const rect = card.getBoundingClientRect();
  for (let k = 0; k < count; k++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'fp';
      p.textContent = SYMS[Math.floor(Math.random() * SYMS.length)];
      p.style.color = pal[Math.floor(Math.random() * pal.length)];
      p.style.left  = (rect.left + Math.random() * rect.width)  + 'px';
      p.style.top   = (rect.top  + Math.random() * rect.height * .5 + window.scrollY) + 'px';
      p.style.setProperty('--dx', ((Math.random() - .5) * 90) + 'px');
      p.style.setProperty('--dy', -(Math.random() * 70 + 20)  + 'px');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }, k * 70);
  }
}

// init
window.addEventListener('load', () => setTimeout(() => typeText(LINES[0]), 600));
</script>
</body>
</html>
